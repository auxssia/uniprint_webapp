<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Print Service | Complete Payment</title>
    <!-- PWA Setup -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main class="app-container">
        
        <!-- Top Nav -->
        <nav class="top-nav">
            <a href="upload.html" class="btn-back" aria-label="Go Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <h2 class="app-title" style="margin: 0; font-size: 1.25rem;">Complete Payment</h2>
        </nav>

        <div class="card mb-4" id="paymentSummary">
            <h3 class="mb-2" style="font-size: 1.1rem;">Order Summary</h3>
            <div style="font-size: 0.95rem; color: var(--text-secondary); line-height: 1.8;">
                <p><strong>Document:</strong> <span id="payDocName">...</span></p>
                <p><strong>Copies:</strong> <span id="payCopies">...</span></p>
                <p><strong>Color:</strong> <span id="payColor">...</span></p>
                <p><strong>Format:</strong> <span id="payFormat">...</span></p>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 1.5rem 0;">
            <div class="price-row">
                <span class="price-label">Total to Pay</span>
                <span class="price-value" id="payTotal">₹0</span>
            </div>
        </div>

        <button type="button" class="btn btn-primary mb-2" id="fakePayBtn" style="background-color: #10b981; margin-top: 1rem; border-bottom: 4px solid #059669;">
            <span class="btn-text" id="payBtnText">I definitely paid. Trust me.</span>
            <div class="spinner d-none" id="paySpinner"></div>
        </button>

        <div id="paymentStatus" class="status-msg"></div>

    </main>

    <script src="js/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/service-worker.js")
                    .then(() => console.log("Service Worker registered"));
            });
        }
    </script>
</body>
</html>
