<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Print Service | Order Print</title>
    <!-- PWA Setup -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    
                    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main class="app-container">
        
        <!-- Top Nav -->
        <nav class="top-nav">
            <a href="index.html" class="btn-back" aria-label="Go Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <h2 class="app-title" style="margin: 0; font-size: 1.25rem;">New Print Order</h2>
        </nav>

        <form id="uploadForm">
            <!-- 1. Document Upload Card -->
            <div class="card mb-4">
                <h3 class="mb-2" style="font-size: 1.1rem;">1. Document</h3>
                
                <div class="upload-zone mb-2" id="uploadZone">
                    <svg class="upload-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
                    </svg>
                    <div class="upload-text">
                        Tap to select a <span>PDF</span>
                    </div>
                    <input type="file" id="fileInput" class="file-input" accept="application/pdf">
                </div>

                <div class="file-selected" id="fileSelected">
                    <div class="file-name-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent-color)" style="flex-shrink: 0;">
                            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
                        </svg>
                        <span class="file-name" id="fileName">document.pdf</span>
                    </div>
                    <button type="button" class="btn-remove" id="removeFileBtn" aria-label="Remove">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 2. Print Options Card -->
            <div class="card mb-4">
                <h3 class="mb-2" style="font-size: 1.1rem;">2. Print Options</h3>
                
                <div class="form-group">
                    <label class="form-label" for="copies">Number of Copies</label>
                    <input type="number" id="copies" class="form-control" value="1" min="1" max="100" required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label">Color Mode</label>
                    <div class="radio-group">
                        <label class="radio-card">
                            <input type="radio" name="colorMode" value="bw" checked>
                            <div class="radio-content">
                                <span class="radio-title">Black & White</span>
                                <span class="radio-price">₹2 / page</span>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="colorMode" value="color">
                            <div class="radio-content">
                                <span class="radio-title">Color</span>
                                <span class="radio-price">₹5 / page</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="doubleSided">
                        <span style="font-size: 0.95rem; font-weight: 500;">Print double-sided</span>
                    </label>
                </div>
            </div>
            
            <!-- Order Summary & Submit -->
            <div class="price-summary-card mb-4">
                <div class="price-row">
                    <span class="price-label">Total Price</span>
                    <span class="price-value" id="totalPrice">₹2</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mb-2" id="btnUpload" disabled>
                <span class="btn-text">Continue to Payment</span>
                <div class="spinner d-none"></div>
            </button>

            <div id="statusMsg" class="status-msg"></div>
        </form>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
