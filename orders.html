<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Print Service | Orders</title>
    <!-- PWA Setup -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main class="app-container">
        
        <!-- Top Nav -->
        <nav class="top-nav">
            <a href="index.html" class="btn-back" aria-label="Go Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <h2 class="app-title" style="margin: 0; font-size: 1.25rem;">My Orders</h2>
        </nav>

        <div id="ordersLoading" class="text-center" style="padding: 3rem 0;">
            <div class="spinner" style="border-top-color: var(--accent-color); width: 32px; height: 32px; border-width: 4px;"></div>
            <p style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.95rem;">Loading orders...</p>
        </div>

        <div id="ordersEmpty" class="text-center" style="display: none; padding: 3rem 1rem;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #cbd5e1; margin-bottom: 1rem;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <h3 style="margin-bottom: 0.5rem;">No orders yet</h3>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">When you place a print request, it will appear here.</p>
        </div>

        <!-- Orders container -->
        <div class="order-list" id="ordersList" style="display: none;">
            <!-- Dynamic order cards will be injected here -->
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <a href="upload.html" class="btn btn-outline" style="border-style: dashed;">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" style="margin-right: 8px;">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                New Request
            </a>
        </div>
    </main>

    <!-- App Logic -->
    <script src="js/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/service-worker.js")
                    .then(() => console.log("Service Worker registered"));
            });
        }
    </script>
</body>
</html>
