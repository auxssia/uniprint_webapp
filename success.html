<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Service | Success</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="app-container">
        <div class="card text-center" style="padding: 4rem 2rem; margin-top: 20px;">
            
            <!-- Success Animated Icon -->
            <div style="margin-bottom: 1.5rem; display: inline-flex;  border-radius: 50%; background: #d1fae5; padding: 1rem;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="var(--success-color)" style="animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
            
            <style>
                @keyframes popIn {
                    0% { transform: scale(0.5); opacity: 0; }
                    100% { transform: scale(1); opacity: 1; }
                }
            </style>

            <h1 class="mb-2" style="font-size: 1.5rem;">Payment Successful!</h1>
            <p class="subtitle mb-6" style="line-height: 1.6;">Your print request has been submitted to the shop. We will notify you when it's ready for pickup.</p>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="orders.html" class="btn btn-primary">
                    View Orders
                </a>
                <a href="index.html" class="btn btn-outline" style="border: none;">
                    Return Home
                </a>
            </div>
        </div>
    </main>

</body>
</html>
